<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Results summary component</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Figtree:ital,wght@0,300..900;1,300..900&family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Hanken+Grotesk:ital,wght@0,100..900;1,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  
  <div class="container">

    <main>
      
      <div class="overall-result">
        <h1>Your Result</h1>
        <div class="your-result">
          <h2>0</h2>
          <p>of 100</p>
        </div>
        <h3>Great</h3>
        <p class="result-description">
          You scored higher than 65% of the
          people who have taken these tests.
        </p>
      </div>

      <div class="result-summary">
        <h3>Summary</h3>
        <div id="reaction" class="category">
          
          <div class="category-name">
            <img src="assets/images/icon-reaction.svg" alt="icon for the reaction category in the summary">
            <p>Reaction</p>
          </div>

          <div class="score">
            <p class="your-score">0</p>
            <p class="max-score"> / 100</p>
          </div>
        </div>
        <div id="memory" class="category">
          
          <div class="category-name">
            <img src="assets/images/icon-memory.svg" alt="icon for the memory category in the summary">
            <p>Memory</p>
          </div>

          <div class="score">
            <p class="your-score">0</p>
            <p class="max-score"> / 100</p>
          </div>

        </div>
        <div id="verbal" class="category">
          
          <div class="category-name">
            <img src="assets/images/icon-verbal.svg" alt="icon for the verbal category in the summary">
            <p>Verbal</p>
          </div>

          <div class="score">
            <p class="your-score">0</p>
            <p class="max-score"> / 100</p>
          </div>

        </div>
        <div id="visual" class="category">

          <div class="category-name">
            <img src="assets/images/icon-visual.svg" alt="icon for the visual category in the summary">
            <p>Visual</p>
          </div>

          <div class="score">
            <p class="your-score">0</p>
            <p class="max-score"> / 100</p>
          </div>

        </div>

        <button type="button">Continue</button>

      </div>

    </main>

  </div>
  <script src="scripts/main.js"></script>
</body>
</html>
